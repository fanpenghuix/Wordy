<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⭐ Wordy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body x-data="quizApp()" x-init="init()">

  <!-- Stars container -->
  <div class="stars" id="stars"></div>

  <!-- Auth loading overlay -->
  <div class="auth-loader" x-show="!authReady" x-cloak>
    <div class="spinner"></div>
  </div>

  <!-- ==================== LOGIN VIEW ==================== -->
  <div class="app login-view" x-show="view === 'login'" x-cloak>
    <div class="login-card">
      <h1 class="login-title">Wordy</h1>
      <p class="login-subtitle">听发音，拼单词</p>
      <form @submit.prevent="login()">
        <div class="login-field">
          <input type="text" x-model="loginUsername" placeholder="用户名" autocomplete="username" required>
        </div>
        <div class="login-field">
          <input type="password" x-model="loginPassword" placeholder="密码" autocomplete="current-password" required
                 :type="showPassword ? 'text' : 'password'">
          <button type="button" class="btn-eye" @click="showPassword = !showPassword" :title="showPassword ? '隐藏密码' : '显示密码'">
            <svg x-show="!showPassword" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
            </svg>
            <svg x-show="showPassword" x-cloak viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
            </svg>
          </button>
        </div>
        <div class="login-remember">
          <label>
            <input type="checkbox" x-model="rememberMe"> 记住用户名和密码
          </label>
        </div>
        <p class="login-error" x-show="loginError" x-text="loginError"></p>
        <button type="submit" class="btn-login" :disabled="loginLoading">
          <span x-show="!loginLoading">登录</span>
          <span x-show="loginLoading">登录中...</span>
        </button>
      </form>
    </div>
  </div>

  <!-- ==================== QUIZ VIEW ==================== -->
  <div class="app" x-show="view === 'quiz'" x-cloak>
    <header>
      <div class="header-actions">
        <button class="spell-mode-btn" x-show="currentUser" @click="toggleSpellMode()" :class="{ active: spellMode }" :title="spellMode ? '切换为认读模式' : '切换为拼写模式'">
          <span x-show="!spellMode">✏️ 拼写模式</span>
          <span x-show="spellMode">📖 认读模式</span>
        </button>
        <div class="user-menu" x-show="currentUser">
          <button class="user-menu-trigger" @click="showUserMenu = !showUserMenu" @click.outside="showUserMenu = false">
            <span>👤</span><span x-text="currentUser?.username"></span>
            <svg class="user-menu-chevron" viewBox="0 0 24 24" width="14" height="14" fill="currentColor" :class="{ open: showUserMenu }">
              <path d="M7 10l5 5 5-5z"/>
            </svg>
          </button>
          <div class="user-menu-dropdown" x-show="showUserMenu" x-cloak x-transition>
            <button class="dropdown-item" @click="navigate('/admin'); showUserMenu = false">
              <span>🔧</span> 后台管理
            </button>
            <hr class="dropdown-divider">
            <button class="dropdown-item" @click="logout()">
              <span>🚪</span> 退出登录
            </button>
          </div>
        </div>
      </div>
      <div class="star-progress" x-show="quizWords.length > 0">
        <template x-for="(result, idx) in quizResults" :key="idx">
          <span class="progress-star"
                :class="{
                  'lit': result === 1,
                  'dimmed': result === 0,
                  'dim': result === null && idx <= currentIndex,
                  'pending': result === null && idx > currentIndex,
                  'current': idx === currentIndex && result === null
                }"
                @click="if (idx < currentIndex) goToQuizWord(idx)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          </span>
        </template>
      </div>
      <span class="progress-placeholder" x-show="quizWords.length === 0"></span>
    </header>

    <div class="empty-state" x-show="quizWords.length === 0 && !loading && !quizComplete">
      <template x-if="totalWords === 0">
        <div>
          <p>还没有单词哦！</p>
          <p class="hint">点击左上角头像进入后台添加单词 →</p>
        </div>
      </template>
      <template x-if="totalWords > 0">
        <div>
          <p>准备好抽查了吗？</p>
          <button class="btn-start-quiz" @click="startQuiz()">开始抽查</button>
        </div>
      </template>
    </div>

    <div class="loading" x-show="loading">
      <div class="spinner"></div>
      <p>准备中...</p>
    </div>

    <div class="quiz-card" x-show="quizWords.length > 0 && currentWord && !loading && !quizComplete">
      <!-- Normal mode: show Chinese -->
      <div class="quiz-word-area" x-show="!revealed && !spellMode" x-cloak>
        <p class="chinese" x-text="currentWord?.chinese"></p>
      </div>

      <!-- Spell mode: listen & hint area -->
      <div class="quiz-word-area" x-show="!revealed && spellMode" x-cloak>
        <div class="spell-hint-area">
          <button class="btn-speak-large" @click="speakWord()" title="听发音">
            <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
          </button>
          <p class="spell-hint" x-show="hintRevealed" x-text="spellHint"></p>
          <button class="btn-hint" x-show="!hintRevealed" @click="showSpellHint()">🔤 提示首字母</button>
        </div>
      </div>

      <div class="quiz-word-area" x-show="revealed" x-cloak>
        <div class="word-with-speak">
          <p class="english" :class="{ 'incorrect': markWrong, 'correct': correctFlash }" x-text="currentWord?.english"></p>
          <button class="btn-speak" @click="speakWord()" title="英式发音朗读">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="quiz-actions">
        <div class="action-buttons-stacked" x-show="!revealed">
          <button class="btn-reveal" @click="reveal()">🔍 显示答案</button>
          <button class="btn-skip-small" @click="skipWord()">⏭ 跳过</button>
        </div>
        <div class="action-buttons-stacked" x-show="revealed && !answered && !quizComplete">
          <button class="btn-correct" @click="markCorrect()">👍 答对了 +1</button>
          <button class="btn-wrong" @click="markIncorrect()">😞 答错了</button>
        </div>
        <div class="action-buttons action-buttons-stacked" x-show="showNext">
          <button class="btn-next" @click="goNext()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            下一个
          </button>
          <button class="btn-restart" @click="restartQuiz()">🔄 重新开始</button>
        </div>
      </div>
    </div>

    <!-- Fly-star feedback -->
    <div class="fly-star-container" x-show="_showFlyStar" x-transition:leave="transition ease-in duration-300" x-transition:leave-start="opacity-1" x-transition:leave-end="opacity-0">
      <div class="fly-star" x-ref="flyStar" :class="{ wrong: !_isCorrectAnswer }"
           :style="`left:${flyStarLeft - flyStarSize / 2}px; top:${flyStarTop - flyStarSize / 2}px; width:${flyStarSize}px; height:${flyStarSize}px;`">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </div>
    </div>

    <!-- Quiz complete overlay -->
    <div class="feedback-overlay complete-overlay" x-show="quizComplete" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100">
      <div class="feedback-content correct">
        <div class="complete-icon">🎉</div>
        <p class="complete-text">今天的抽查完成啦！</p>
        <div class="accuracy-display">
          <span class="accuracy-value" x-text="todayAccuracy"></span>
          <span class="accuracy-label">正确率</span>
          <span class="accuracy-detail" x-text="correctCount + ' / ' + totalAnswered"></span>
        </div>
        <div class="complete-actions">
          <button class="btn-retry" @click="retryQuiz()">🔄 再考一次</button>
          <button class="btn-go-back" @click="goBackFromComplete()">🏠 返回首页</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== ADMIN VIEW ==================== -->
  <div class="admin-page" x-show="view === 'admin'" x-cloak>
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <button class="btn-back" @click="navigate('/')" title="返回抽查页面">← 返回</button>
        <h2>📋 后台管理</h2>
      </div>
      <nav class="sidebar-nav">
        <button :class="{ active: adminTab === 'voice' }" @click="navigate('/admin/voice')">
          <span class="nav-icon">🔊</span>
          <span>语音设置</span>
        </button>
        <button :class="{ active: adminTab === 'quizLimit' }" @click="navigate('/admin/quizLimit')">
          <span class="nav-icon">📅</span>
          <span>抽查设置</span>
        </button>
        <button :class="{ active: adminTab === 'words' }" @click="navigate('/admin/words')">
          <span class="nav-icon">📝</span>
          <span>单词管理</span>
        </button>
        <button :class="{ active: adminTab === 'stats' }" @click="navigate('/admin/stats')">
          <span class="nav-icon">📊</span>
          <span>统计</span>
        </button>
        <template x-if="currentUser?.role === 'admin'">
          <button :class="{ active: adminTab === 'users' }" @click="navigate('/admin/users')">
            <span class="nav-icon">👥</span>
            <span>用户管理</span>
          </button>
        </template>
      </nav>
    </aside>

    <!-- Content -->
    <main class="admin-content">
      <!-- ===== Voice Settings ===== -->
      <div x-show="adminTab === 'voice'" class="content-panel">
        <h3 class="panel-title">🔊 语音设置</h3>

        <div class="setting-card">
          <label class="setting-label">发音类型</label>
          <div class="speak-gender-options">
            <button class="speak-gender-btn" :class="{ active: pendingGender === 'female' }" @click="setSpeakGender('female')">
              女声
            </button>
            <button class="speak-gender-btn" :class="{ active: pendingGender === 'male' }" @click="setSpeakGender('male')">
              男声
            </button>
          </div>
        </div>

        <div class="setting-card">
          <label class="setting-label">具体发音人</label>
          <select class="speak-voice-select" x-model="pendingVoiceName" @change="setSpeakVoice(pendingVoiceName)">
            <template x-for="voice in getVoicesList()" :key="voice.name">
              <option :value="voice.name" x-text="voice.name.split('-').pop()"></option>
            </template>
          </select>
        </div>

        <div class="setting-card">
          <label class="setting-label">发音速度：<span x-text="pendingSpeed.toFixed(2)"></span>x</label>
          <div class="speak-speed-options">
            <template x-for="speed in [0.5, 0.6, 0.7, 0.8, 0.85, 0.9, 1.0, 1.1, 1.2, 1.5]" :key="speed">
              <button class="speak-speed-btn" :class="{ active: pendingSpeed === speed }" @click="setSpeakSpeed(speed)">
                <span x-text="speed.toFixed(2)"></span>
              </button>
            </template>
          </div>
        </div>

        <div class="setting-card voice-actions" style="text-align: center;">
          <button class="btn-preview" @click="previewSpeak()">试听</button>
          <button class="btn-save" @click="saveVoiceSettings()" :disabled="!voiceSettingsChanged" style="margin-left: 12px;">保存设置</button>
        </div>
      </div>

      <!-- ===== Quiz Limit Settings ===== -->
      <div x-show="adminTab === 'quizLimit'" class="content-panel">
        <h3 class="panel-title">📅 抽查设置</h3>

        <div class="setting-card">
          <label class="setting-label">限额模式</label>
          <div class="quiz-limit-mode-btns">
            <button class="mode-btn" :class="{ active: pendingQuizLimitMode === 'ratio' }" @click="setQuizLimitMode('ratio')">
              按比例
            </button>
            <button class="mode-btn" :class="{ active: pendingQuizLimitMode === 'fixed' }" @click="setQuizLimitMode('fixed')">
              按固定词数
            </button>
          </div>
        </div>

        <div class="setting-card" x-show="pendingQuizLimitMode === 'ratio'">
          <label class="setting-label">抽查比例：<span x-text="pendingQuizLimitValue"></span>%</label>
          <div class="preset-btns">
            <template x-for="v in [10, 20, 30, 50, 80, 100]" :key="v">
              <button class="preset-btn" :class="{ active: pendingQuizLimitValue === v }" @click="setQuizLimitValue(v)" x-text="v + '%'"></button>
            </template>
          </div>
          <div class="custom-input-row">
            <input type="number" min="1" max="100" x-model.number="pendingQuizLimitValue" class="custom-input" placeholder="自定义比例">
            <span class="custom-input-unit">%</span>
          </div>
        </div>

        <div class="setting-card" x-show="pendingQuizLimitMode === 'fixed'">
          <label class="setting-label">每日词数：<span x-text="pendingQuizLimitValue"></span> 词</label>
          <div class="preset-btns">
            <template x-for="v in [10, 20, 30, 50, 100, 200]" :key="v">
              <button class="preset-btn" :class="{ active: pendingQuizLimitValue === v }" @click="setQuizLimitValue(v)" x-text="v"></button>
            </template>
          </div>
          <div class="custom-input-row">
            <input type="number" min="1" max="9999" x-model.number="pendingQuizLimitValue" class="custom-input" placeholder="自定义词数">
            <span class="custom-input-unit">词</span>
          </div>
        </div>

        <div class="setting-card voice-actions" style="text-align: center;">
          <button class="btn-save" @click="saveQuizLimitSettings()" :disabled="!quizLimitSettingsChanged">保存设置</button>
        </div>
      </div>

      <!-- ===== Word Management ===== -->
      <div x-show="adminTab === 'words'" class="content-panel">
        <h3 class="panel-title">📝 单词管理</h3>

        <!-- Toolbar -->
        <div class="word-toolbar">
          <input type="text" x-model="newEnglish" placeholder="英文单词" @keydown.enter="addWord()" class="toolbar-input">
          <input type="text" x-model="newChinese" placeholder="中文意思" @keydown.enter="addWord()" class="toolbar-input">
          <button class="btn-add" @click="addWord()" :disabled="!newEnglish || !newChinese">添加</button>
          <input type="text" x-model="searchQuery" placeholder="🔍 搜索..." @input="onWordSearchInput()" class="toolbar-search">
          <p class="save-msg" x-show="saveMsg" x-text="saveMsg"></p>
        </div>

        <!-- Word Table -->
        <div class="word-table-wrapper">
          <table class="word-table">
            <thead>
              <tr>
                <th class="col-id">#</th>
                <th class="col-english">英文</th>
                <th class="col-chinese">中文</th>
                <th class="col-actions">操作</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="(word, idx) in wordPageWords" :key="word.id">
                <tr>
                  <td class="col-id" x-text="(wordCurrentPage - 1) * wordPageSize + idx + 1"></td>
                  <td class="col-english" x-text="word.english"></td>
                  <td class="col-chinese" x-text="word.chinese"></td>
                  <td class="col-actions">
                    <button class="btn-sm btn-edit" @click="editWord(word)">编辑</button>
                    <button class="btn-sm btn-del" @click="deleteWord(word.id)">删除</button>
                  </td>
                </tr>
              </template>
              <tr x-show="wordPageWords.length === 0">
                <td colspan="4" class="empty-table-cell">暂无单词</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" x-show="filteredWords.length > 0">
          <span class="pagination-info" x-text="wordPageInfo"></span>
          <div class="pagination-buttons">
            <button class="page-btn" :disabled="wordCurrentPage === 1" @click="wordGoToPage(1)" title="首页">&laquo;</button>
            <button class="page-btn" :disabled="wordCurrentPage === 1" @click="wordGoToPage(wordCurrentPage - 1)" title="上一页">&lsaquo;</button>
            <template x-for="p in wordPageNumbers" :key="p">
              <button class="page-btn" :class="{ active: p === wordCurrentPage }" @click="wordGoToPage(p)" x-text="p"></button>
            </template>
            <button class="page-btn" :disabled="wordCurrentPage === wordTotalPages" @click="wordGoToPage(wordCurrentPage + 1)" title="下一页">&rsaquo;</button>
            <button class="page-btn" :disabled="wordCurrentPage === wordTotalPages" @click="wordGoToPage(wordTotalPages)" title="末页">&raquo;</button>
          </div>
        </div>
      </div>

      <!-- ===== Statistics ===== -->
      <div x-show="adminTab === 'stats'" class="content-panel">
        <h3 class="panel-title">📊 统计</h3>

        <nav class="stats-tabs">
          <button :class="{ active: statsTab === 'sm2' }" @click="setStatsTab('sm2')">间隔重复</button>
          <button :class="{ active: statsTab === 'word' }" @click="setStatsTab('word')">单词详情</button>
          <button :class="{ active: statsTab === 'daily' }" @click="setStatsTab('daily')">每日报告</button>
          <button :class="{ active: statsTab === 'trend' }" @click="setStatsTab('trend')">趋势</button>
          <button :class="{ active: statsTab === 'worst' }" @click="setStatsTab('worst')">错词排行</button>
        </nav>

        <div x-show="statsTab === 'sm2'" class="stats-panel">
          <div class="sm2-overview" x-show="sm2Overview">
            <div class="sm2-stat">
              <span class="sm2-label">总词数</span>
              <span class="sm2-value" x-text="sm2Overview?.total || 0"></span>
            </div>
            <div class="sm2-stat">
              <span class="sm2-label">今日到期</span>
              <span class="sm2-value" x-text="sm2Overview?.dueToday || 0"></span>
            </div>
            <div class="sm2-stat">
              <span class="sm2-label">平均难度系数</span>
              <span class="sm2-value" x-text="sm2Overview?.avgEfactor || 0"></span>
            </div>
            <template x-for="stage in sm2Overview?.stageDist || []" :key="stage.stage">
              <div class="sm2-stat">
                <span class="sm2-label" x-text="stage.stage"></span>
                <span class="sm2-value" x-text="stage.count"></span>
              </div>
            </template>
          </div>
          <div class="sm2-word-list">
            <template x-for="sw in sm2Paged" :key="sw.id">
              <div class="sm2-word-item">
                <div class="sm2-word-info">
                  <span class="sm2-word-text" x-text="`${sw.english} (${sw.chinese})`"></span>
                  <span class="sm2-stage-badge" :class="getMasteryColor(sw.efactor)" x-text="getStageLabel(sw.repetitions)"></span>
                </div>
                <div class="sm2-word-details">
                  <span class="sm2-detail" x-text="`间隔: ${sw.interval}天`"></span>
                  <span class="sm2-detail" :class="getMasteryColor(sw.efactor)" x-text="`系数: ${sw.efactor}`"></span>
                  <span class="sm2-detail" x-text="`下次: ${sw.next_review}`"></span>
                </div>
              </div>
            </template>
          </div>
          <p x-show="sm2WordStates.length === 0" class="empty-hint">暂无数据</p>
          <div class="pagination" x-show="sm2WordStates.length > 0">
            <span class="pagination-info" x-text="sm2PageInfo"></span>
            <div class="pagination-buttons">
              <button class="page-btn" :disabled="sm2Page === 1" @click="sm2GoPage(1)" title="首页">&laquo;</button>
              <button class="page-btn" :disabled="sm2Page === 1" @click="sm2GoPage(sm2Page - 1)" title="上一页">&lsaquo;</button>
              <template x-for="p in sm2PageNums" :key="p">
                <button class="page-btn" :class="{ active: p === sm2Page }" @click="sm2GoPage(p)" x-text="p"></button>
              </template>
              <button class="page-btn" :disabled="sm2Page === sm2TotalPages" @click="sm2GoPage(sm2Page + 1)" title="下一页">&rsaquo;</button>
              <button class="page-btn" :disabled="sm2Page === sm2TotalPages" @click="sm2GoPage(sm2TotalPages)" title="末页">&raquo;</button>
            </div>
          </div>
        </div>

        <div x-show="statsTab === 'word'" class="stats-panel">
          <div class="word-stats-list">
            <template x-for="ws in wordStatsPaged" :key="ws.id">
              <div class="word-stat-item">
                <span class="ws-word" x-text="`${ws.english} (${ws.chinese})`"></span>
                <span class="ws-accuracy" :class="ws.accuracy >= 0.8 ? 'good' : ws.accuracy >= 0.5 ? 'warn' : 'bad'"
                      x-text="ws.total > 0 ? `${Math.round(ws.accuracy * 100)}% (${ws.correct}/${ws.total})` : '未考过'">
                </span>
              </div>
            </template>
          </div>
          <div class="pagination" x-show="wordStats.length > 0">
            <span class="pagination-info" x-text="wordStatsPageInfo"></span>
            <div class="pagination-buttons">
              <button class="page-btn" :disabled="wordStatsPage === 1" @click="wordStatsGoPage(1)" title="首页">&laquo;</button>
              <button class="page-btn" :disabled="wordStatsPage === 1" @click="wordStatsGoPage(wordStatsPage - 1)" title="上一页">&lsaquo;</button>
              <template x-for="p in wordStatsPageNums" :key="p">
                <button class="page-btn" :class="{ active: p === wordStatsPage }" @click="wordStatsGoPage(p)" x-text="p"></button>
              </template>
              <button class="page-btn" :disabled="wordStatsPage === wordStatsTotalPages" @click="wordStatsGoPage(wordStatsPage + 1)" title="下一页">&rsaquo;</button>
              <button class="page-btn" :disabled="wordStatsPage === wordStatsTotalPages" @click="wordStatsGoPage(wordStatsTotalPages)" title="末页">&raquo;</button>
            </div>
          </div>
        </div>

        <div x-show="statsTab === 'daily'" class="stats-panel">
          <template x-for="d in dailyStatsPaged" :key="d.date">
            <div class="daily-item">
              <span class="d-date" x-text="d.date"></span>
              <span class="d-count" x-text="`共 ${d.total} 题`"></span>
              <span class="d-accuracy" x-text="`正确率 ${Math.round(d.accuracy * 100)}%`"></span>
            </div>
          </template>
          <p x-show="dailyStats.length === 0" class="empty-hint">暂无数据</p>
          <div class="pagination" x-show="dailyStats.length > 0">
            <span class="pagination-info" x-text="dailyStatsPageInfo"></span>
            <div class="pagination-buttons">
              <button class="page-btn" :disabled="dailyStatsPage === 1" @click="dailyStatsGoPage(1)" title="首页">&laquo;</button>
              <button class="page-btn" :disabled="dailyStatsPage === 1" @click="dailyStatsGoPage(dailyStatsPage - 1)" title="上一页">&lsaquo;</button>
              <template x-for="p in dailyStatsPageNums" :key="p">
                <button class="page-btn" :class="{ active: p === dailyStatsPage }" @click="dailyStatsGoPage(p)" x-text="p"></button>
              </template>
              <button class="page-btn" :disabled="dailyStatsPage === dailyStatsTotalPages" @click="dailyStatsGoPage(dailyStatsPage + 1)" title="下一页">&rsaquo;</button>
              <button class="page-btn" :disabled="dailyStatsPage === dailyStatsTotalPages" @click="dailyStatsGoPage(dailyStatsTotalPages)" title="末页">&raquo;</button>
            </div>
          </div>
        </div>

        <div x-show="statsTab === 'trend'" class="stats-panel">
          <div class="trend-chart">
            <template x-for="t in trendData" :key="t.label">
              <div class="trend-bar">
                <span class="trend-label" x-text="t.label"></span>
                <div class="trend-fill">
                  <div class="trend-fill-inner" :style="`width: ${t.accuracy * 100}%`"></div>
                </div>
                <span class="trend-value" x-text="`${Math.round(t.accuracy * 100)}%`"></span>
              </div>
            </template>
          </div>
          <p x-show="trendData.length === 0" class="empty-hint">暂无数据</p>
        </div>

        <div x-show="statsTab === 'worst'" class="stats-panel">
          <template x-for="(w, i) in worstWords" :key="w.id">
            <div class="worst-item">
              <span class="worst-rank" x-text="`${i + 1}`"></span>
              <span class="worst-word" x-text="`${w.english} (${w.chinese})`"></span>
              <span class="worst-accuracy" :class="w.accuracy >= 0.5 ? 'warn' : 'bad'"
                    x-text="`${Math.round(w.accuracy * 100)}%`"></span>
            </div>
          </template>
          <p x-show="worstWords.length === 0" class="empty-hint">暂无数据</p>
        </div>
      </div>

      <!-- ===== User Management ===== -->
      <div x-show="adminTab === 'users'" class="content-panel">
        <h3 class="panel-title">👥 用户管理</h3>

        <div class="add-form">
          <input type="text" x-model="newUsername" placeholder="用户名">
          <input type="password" x-model="newPassword" placeholder="密码">
          <select x-model="newRole">
            <option value="user">普通用户</option>
            <option value="admin">管理员</option>
          </select>
          <button class="btn-save" @click="addUser()" :disabled="!newUsername || !newPassword">创建</button>
          <p class="save-msg" x-show="userSaveMsg" x-text="userSaveMsg"></p>
        </div>

        <div class="word-list-section">
          <div class="word-list">
            <template x-for="u in users" :key="u.id">
              <div class="word-item">
                <div class="word-info">
                  <span class="word-en" x-text="u.username"></span>
                  <span class="word-zh" :class="u.role === 'admin' ? 'role-admin' : 'role-user'" x-text="u.role === 'admin' ? '管理员' : '用户'"></span>
                </div>
                <div class="word-actions">
                  <button class="btn-sm btn-edit" @click="editUser(u)" x-show="u.id !== currentUser?.id">编辑</button>
                  <button class="btn-sm btn-del" @click="deleteUser(u.id)" x-show="u.id !== currentUser?.id">删除</button>
                  <span x-show="u.id === currentUser?.id" class="self-badge">自己</span>
                  <button class="btn-sm btn-info" :title="`${u.username} 共有 ${userWordCounts[u.id] || 0} 个单词`">
                    <span x-text="`📚 ${userWordCounts[u.id] || 0} 词`"></span>
                  </button>
                </div>
              </div>
            </template>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Edit Modal -->
  <div class="edit-modal" x-show="editingWord" x-cloak @click.self="editingWord = null">
    <div class="edit-form">
      <h3>编辑单词</h3>
      <input type="text" x-model="editEnglish" placeholder="英文">
      <input type="text" x-model="editChinese" placeholder="中文">
      <div class="edit-actions">
        <button class="btn-save" @click="saveEdit()">保存</button>
        <button class="btn-cancel" @click="editingWord = null">取消</button>
      </div>
    </div>
  </div>

  <!-- Edit User Modal -->
  <div class="edit-modal" x-show="editingUser" x-cloak @click.self="editingUser = null">
    <div class="edit-form">
      <h3>编辑用户</h3>
      <input type="text" x-model="editUserUsername" placeholder="用户名">
      <input type="password" x-model="editUserPassword" placeholder="新密码（留空不改）">
      <select x-model="editUserRole">
        <option value="user">普通用户</option>
        <option value="admin">管理员</option>
      </select>
      <div class="edit-actions">
        <button class="btn-save" @click="saveEditUser()">保存</button>
        <button class="btn-cancel" @click="editingUser = null">取消</button>
      </div>
    </div>
  </div>

  <script src="alpine.min.js" defer></script>
  <script src="app.js"></script>

</body>
</html>
